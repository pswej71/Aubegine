version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: solar_db
    environment:
      POSTGRES_USER: solar_user
      POSTGRES_PASSWORD: solar_password
      POSTGRES_DB: solar_monitoring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: solar_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://solar_user:solar_password@database:5432/solar_monitoring
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: solar_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
